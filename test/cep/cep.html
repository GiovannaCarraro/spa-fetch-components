<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fetch</title>

    <script src="cep.js" defer></script>
</head>
<body>
    
    <h2>Digite o cep:</h2>

    <form>
        <input type="text" id="cep" placeholder="Escreva aqui">

        <br><br>

        <button type="button" id="btnThen">then().</button>
        <button type="button" id="btnAsync">async/await</button>
    </form>

</body>

<script>

const btnThen = document.getElementById('btnThen')
const btnAsync = document.getElementById('btnAsync')
const inputCep = document.getElementById('cep')


// botao then
btnThen.addEventListener('click', (event) => {

    event.preventDefault()

    const cep = inputCep.value

    fetch(`https://viacep.com.br/ws/${cep}/json/`)

    .then((resposta) => {

        if (!resposta.ok) {
            throw new Error('CEP inválido')
        }

        return resposta.json()
    })

    .then((dados) => {

        if (dados.erro) {
            throw new Error('CEP não encontrado')
        }

        console.log(dados)
        alert(`Cidade: ${dados.localidade}`)

    })

    .catch((erro) => {
        console.warn(erro.message)
    })

})



// botao async
btnAsync.addEventListener('click', async (event) => {

    event.preventDefault()

    try {

        const cep = inputCep.value

        const resposta = await fetch(`https://viacep.com.br/ws/${cep}/json/`)

        if (!resposta.ok) {
            throw new Error('CEP inválido')
        }

        const dados = await resposta.json()

        if (dados.erro) {
            throw new Error('CEP não encontrado')
        }

        console.log(dados)
        alert(`Cidade: ${dados.localidade}`)

    } catch (erro) {

        console.warn(erro.message)

    }

})

</script>
</html>
